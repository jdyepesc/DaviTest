# ============================================================
# Configuracion general del framework DaviTest
# ============================================================

# Navegador: chrome | firefox | edge
browser=chrome

# URL base de la aplicacion bajo prueba
base.url=https://www.google.com

# Timeout en segundos para esperas explicitas
explicit.wait=15

# Timeout en segundos para carga de pagina
page.load.timeout=30

# Ejecutar en modo headless: true | false
headless=false

# Entorno: dev | qa | staging | prod
environment=qa
